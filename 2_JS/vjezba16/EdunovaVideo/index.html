<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edunova Polaznici - Frontend Developer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Edunova Frontend Developeri</h1>
        <button id="show-all-btn" class="btn">Prikaži sve videe</button>
    </header>

    <main>
        <div id="student-list" class="student-container">
            <!-- Polaznici će biti dinamički dodani ovdje -->
        </div>
    </main>

    <div id="video-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <video id="modal-video" width="100%" controls>
                <source src="" type="video/mp4">
                Vaš preglednik ne podržava video tag.
            </video>
        </div>
    </div>

    <div id="gallery-modal" class="modal">
        <div class="modal-content">
            <span class="close-gallery-btn">&times;</span>
            <h2>Galerija videa</h2>
            <div id="video-gallery" class="gallery-container">
                <!-- Videi će biti dodani ovdje -->
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
